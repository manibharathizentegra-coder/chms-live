<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

.card{
    max-width:600px;
    margin:auto;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
    background:#2c3e50;
    color:white;
    padding:20px;
    text-align:center;
}

.content{
    padding:25px;
}

.info{
    background:#f8f9fa;
    padding:15px;
    border-radius:8px;
    margin:15px 0;
}

.footer{
    text-align:center;
    padding:15px;
    background:#f4f6f9;
    color:#666;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h2>📚 Exam Notification</h2>
    </div>

    <div class="content">


        <div class="info">
            <p><strong>Academic Year:</strong> {{ academic_year }}</p>
            <p><strong>Grade:</strong> {{ grade }}</p>
            <!-- <p><strong>Exam Date:</strong> {{ exam_date }}</p>
            <p><strong>Exam Time:</strong> {{ exam_time }}</p> -->
        </div>

        <p>Dear Student,</p>

        <p>{{ message }}</p>

        <p>Please be prepared and arrive on time.</p>

        <p>
            Regards,<br>
            Chms
        </p>

    </div>

    <div class="footer">
        This is an automated email.
    </div>

</div>

</body>
</html>
