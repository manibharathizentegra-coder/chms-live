<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Report</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#2c3e50;
            color:white;
            padding:12px;
            text-align:left;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f8f9fa;
        }

@media screen and (max-width:768px){

    .filters{
        flex-direction:column;
    }

    select,
    input,
    button{
        width:100%;
    }

    table{
        font-size:14px;
    }

    th,td{
        padding:8px;
    }
}
    </style>

</head>
<body>

<div class="container">

    <h2>Teacher Report</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile Number</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody>

            {% for teacher in teachers %}
            <tr>

                <td>
                    {{ teacher.Name.zc_display_value }}
                </td>

                <td>
                    {{ teacher.Mobile_Number }}
                </td>

                <td>
                    {{ teacher.Email1 }}
                </td>

            </tr>
            {% empty %}
            <tr>
                <td colspan="3">
                    No Records Found
                </td>
            </tr>
            {% endfor %}

        </tbody>
    </table>

</div>

</body>
</html>
