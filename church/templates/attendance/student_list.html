<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Student Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        /* ===== SIDEBAR & OVERLAY STYLES ===== */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

.mobile-sidebar {
    position: fixed;
    top: 0;
    left: -280px;
    width: 280px;
    height: 100%;
    background: white;
    z-index: 1000;
    box-shadow: 4px 0 25px rgba(0,0,0,0.15);
    transition: left 0.3s ease;
    display: flex;
    flex-direction: column;
}

.mobile-sidebar.active {
    left: 0;
}

.sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid #f0f4ff;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-header h3 {
    font-size: 18px;
    font-weight: 700;
    color: #1e2a4a;
}

.close-btn {
    background: none;
    border: none;
    font-size: 18px;
    color: #8d99ae;
    cursor: pointer;
    transition: color 0.3s;
}

.close-btn:hover {
    color: #ff4a4a;
}

.sidebar-menu {
    padding: 20px 0;
    flex: 1;
    overflow-y: auto;
}

.sidebar-menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    color: #4a5568;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    transition: all 0.3s ease;
}

.sidebar-menu a i {
    font-size: 16px;
    color: #8d99ae;
    width: 20px;
    transition: color 0.3s;
}

.sidebar-menu a:hover {
    background: #eef2ff;
    color: #4a6bc5;
}

.sidebar-menu a:hover i {
    color: #4a6bc5;
}

.sidebar-menu a.active {
    background: #eef2ff;
    color: #4a6bc5;
    font-weight: 600;
}

.sidebar-menu a.active i {
    color: #4a6bc5;
}

.sidebar-footer {
    padding: 20px;
    border-top: 1px solid #f0f4ff;
}

.mobile-logout {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #e53e3e;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    padding: 10px;
    border-radius: 8px;
    transition: background 0.3s;
}

.mobile-logout:hover {
    background: #fff5f5;
}
        /* Smooth Page Load Animation */
        body {
            animation: fadeInPage 0.5s ease-in-out;
        }

        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .filter-btn,
            .btn-status,
            .menu-btn,
            .sidebar-menu a {
                transition: all 0.3s ease;
            }

            .filter-btn:hover,
            .btn-status:hover,
            .menu-btn:hover {
                transform: translateY(-2px);
            }

        /* Card Animations */
        .container,
        .page-header,
        .filters,
        .table-container {
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* General Reset & Modern Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            padding: 30px 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Navigation & Hamburger Button Alignment */
        .top-nav {
            max-width: 1180px;
            margin: 0 auto 15px;
        }

        .menu-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #1e2a4a;
            border: 1px solid #e2e8f0;
            padding: 12px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(74, 107, 197, 0.1);
            transition: all 0.3s ease;
        }


        .menu-btn i {
            color: #4a6bc5;
            font-size: 18px;
        }

        .menu-btn:hover {
            background: #4a6bc5;
            border-color: #4a6bc5;
        }

        .menu-btn:hover i {
            color: white;
        }

        /* Slide-out Sidebar Drawer Styling */
        .mobile-sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #ffffff;
            z-index: 1000;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.05);
            transition: left 0.4s ease;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .mobile-sidebar.active {
            left: 0;
        }

        

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.01em;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        .sidebar-menu {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #475569;
            text-decoration: none;
            font-weight: 500;
            font-size: 14.5px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .sidebar-menu a:hover {
            background: #f1f5f9;
            color: #3b82f6;
        }

        /* Active Page Highlighting */
        .sidebar-menu a.active {
            background: #eff6ff;
            color: #3b82f6;
            font-weight: 600;
        }

        .sidebar-menu a i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #f1f5f9;
        }

        .mobile-logout {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #ef4444;
            text-decoration: none;
            font-weight: 500;
            font-size: 14.5px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .mobile-logout:hover {
            background: #fef2f2;
        }

        /* Dim Backdrop Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(2px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Main Container */
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            margin-bottom: 24px;
            color: #0f172a;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }

        /* Filters Section Layout */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            align-items: flex-end;
        }

        /* Filter Field Group Wrapper */
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 160px;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select,
        input[type="date"] {
            padding: 12px 14px;
            border: 1px solid #dbe3ee;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            height: 45px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, 
        input[type="date"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .filter-btn {
            padding: 12px 28px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            height: 45px;
            transition: background-color 0.2s;
        }

        .filter-btn:hover {
            background: #2563eb;
        }

        /* Table Design & Execution Alignment */
        .table-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: #eff6ff;
        }

        th {
            color: #1e3a8a;
            font-weight: 700;
            padding: 16px 20px;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            font-size: 15px;
            color: #334155;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        /* Grade Badge Styling */
        .grade-badge {
            font-weight: 600;
            color: #475569;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            font-size: 13px;
        }

        /* Attendance Action Pill Rules */
        .attendance-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-status {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: white;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-status:active {
            transform: scale(0.96);
        }

        .present {
            background-color: #10b981;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.1);
        }

        .present:hover {
            background-color: #059669;
        }

        .absent {
            background-color: #ef4444;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.1);
        }

        .absent:hover {
            background-color: #dc2626;
        }

        .header-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ecfdf5;
            flex-shrink: 0;
        }

        .teacher-avatar {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, #eef4ff, #f7faff);
        }

        .page-header h2 {
            margin: 0;
            color: #1e3a8a;
            font-size: 28px;
            font-weight: 700;
        }

        #studentTable {
            display: none;
        }

        /* Single-Screen Mobile Responsive Media Queries */
        @media screen and (max-width: 640px) {
            body {
                padding: 12px 8px;
            }

            .container {
                padding: 16px;
                border-radius: 12px;
            }

            /* Adjusted Header sizes on Mobile so they look clean and legible */
            .page-header {
                padding: 14px 16px;
                gap: 14px;
                margin-bottom: 20px;
            }

            .page-header h2 {
                font-size: 20px;
                line-spacing: -0.01em;
            }

            .header-avatar {
                width: 46px;
                height: 46px;
                border-width: 2px;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
                padding: 14px;
                gap: 12px;
            }

            .filter-group, 
            .filter-btn {
                width: 100%;
            }

            .filter-btn {
                margin-top: 4px;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            .table-container {
                border: none;
            }

            #studentTable tr {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-areas: 
                    "student-name tracking-buttons"
                    "student-grade tracking-buttons";
                padding: 16px 4px;
                border-bottom: 1px solid #e2e8f0;
                align-items: center;
                gap: 6px 12px;
            }

            #studentTable tr:hover {
                background-color: transparent;
            }

            td:nth-child(1) {
                grid-area: student-name;
                font-weight: 600;
                font-size: 15px;
                color: #0f172a;
                padding: 0;
                border: none;
            }

            td:nth-child(2) {
                grid-area: tracking-buttons;
                padding: 0;
                border: none;
                justify-self: end;
            }

            td:nth-child(3) {
                grid-area: student-grade;
                padding: 0;
                border: none;
            }

            .grade-badge {
                background: transparent;
                padding: 0;
                font-size: 12px;
                color: #64748b;
                font-weight: 400;
            }

            .grade-badge::before {
                content: "Grade ";
            }

            .attendance-actions {
                gap: 6px;
            }

            .btn-status {
                padding: 10px 14px;
                font-size: 13px;
                border-radius: 8px;
            }

            .top-nav {
                margin-bottom: 10px;
            }
        }
        #studentTable tr {
            animation: rowFade 0.4s ease;
        }

        @keyframes rowFade {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="mobile-sidebar" id="mobileSidebar">
    <div class="sidebar-header">
        <h3>Teacher Portal</h3>
        <button class="close-btn" onclick="closeSidebar()" aria-label="Close Navigation">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div class="sidebar-menu">
        <a href="/teacher-dashboard/">
            <i class="fas fa-chart-line"></i> Dashboard
        </a>
        <a href="/profile/">
            <i class="fas fa-user-tie"></i> Profile
        </a>
        <a href="/my-classes/">
            <i class="fas fa-school"></i> My Classes
        </a>
        <a href="/students/" class="active">
            <i class="fas fa-calendar-check"></i> Attendance
        </a>
        <a href="/student-marks/">
            <i class="fas fa-file-signature"></i> Student Marks
        </a>
        <a href="/send-mail/">
            <i class="fas fa-envelope-open-text"></i> Send Mail
        </a>
        <a href="/promote-students/">
            <i class="fas fa-user-graduate"></i> Promote Students
        </a>
    </div>

    <div class="sidebar-footer">
        <a href="/logout/" class="mobile-logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<div class="top-nav">
    <button class="menu-btn" onclick="openSidebar()" title="Open Navigation" aria-label="Open Navigation">
        <i class="fas fa-bars"></i>
    </button>
</div>

<div class="container">

    <div class="page-header">
        <div class="header-avatar">
            <img src="https://img.icons8.com/?size=128&id=vIlfTNnpiQPe&format=png&color=10B981" alt="Teacher" class="teacher-avatar">
        </div>
        <h2>Student Attendance</h2>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label for="academicYear">Academic Year</label>
            <select id="academicYear">
                <option value="">Select Year</option>
                {% for year in academic_years %}
                    <option value="{{ year }}" {% if year == selected_year %}selected{% endif %}>
                        {{ year }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-group">
            <label for="gradeFilter">Grade</label>
            <select id="gradeFilter">
                <option value="">Select Grade</option>
                <option value="Grade A" {% if selected_grade == "Grade A" %}selected{% endif %}>Grade A</option>
                <option value="Grade B" {% if selected_grade == "Grade B" %}selected{% endif %}>Grade B</option>
                <option value="Grade C" {% if selected_grade == "Grade C" %}selected{% endif %}>Grade C</option>
                <option value="Grade D" {% if selected_grade == "Grade D" %}selected{% endif %}>Grade D</option>
                <option value="Grade E" {% if selected_grade == "Grade E" %}selected{% endif %}>Grade E</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="attendanceDate">Select Date</label>
            <input type="date" id="attendanceDate">
        </div>

        <button class="filter-btn" onclick="filterStudents()">
            Filter
        </button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Attendance</th>
                    <th>Grade</th>
                </tr>
            </thead>

            <tbody id="studentTable">
            {% for student in students %}
                <tr data-grade="{{ student.Class_Grade }}" data-year="{{ student.Academic_Year }}" data-student="{{ student.Student_Name.zc_display_value }}">
                    <td>{{ student.Student_Name.zc_display_value }}</td>
                    <td>
                        <div class="attendance-actions">
                            <button class="btn-status present" onclick="markAttendance(this, 'Present')">
                                Present
                            </button>
                            <button class="btn-status absent" onclick="markAttendance(this, 'Absent')">
                                Absent
                            </button>
                        </div>
                    </td>
                    <td>
                        <span class="grade-badge">{{ student.Class_Grade }}</span>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script>
// Sidebar Control Routines
function openSidebar() {
    document.getElementById("mobileSidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar() {
    document.getElementById("mobileSidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

document.addEventListener("DOMContentLoaded", function() {
    // Set today's date automatically
    let today = new Date().toISOString().split("T")[0];
    document.getElementById("attendanceDate").value = today;

    // If Grade and Academic Year came from URL/Django context
    let grade = document.getElementById("gradeFilter").value;
    let year = document.getElementById("academicYear").value;

    if (grade && year) {
        filterStudents();
    }
});

function filterStudents() {
    let selectedGrade = document.getElementById("gradeFilter").value;
    let selectedYear = document.getElementById("academicYear").value;
    let selectedDate = document.getElementById("attendanceDate").value;

    let tableBody = document.getElementById("studentTable");
    let rows = document.querySelectorAll("#studentTable tr");

    // Show students only when all filters selected
    if (!selectedGrade || !selectedYear || !selectedDate) {
        tableBody.style.display = "none";
        alert("Please select Academic Year, Grade and Date");
        return;
    }

    tableBody.style.display = "table-row-group";

    rows.forEach(function(row) {
        let grade = row.getAttribute("data-grade");
        let year = row.getAttribute("data-year");

        let gradeMatch = grade === selectedGrade;
        let yearMatch = year === selectedYear;

        row.style.display = (gradeMatch && yearMatch) ? "" : "none";
    });
}

function markAttendance(button, status) {
    let row = button.closest("tr");

    let studentName = row.getAttribute("data-student");
    let grade = row.getAttribute("data-grade");
    let academicYear = row.getAttribute("data-year");
    let attendanceDate = document.getElementById("attendanceDate").value;

    if (!attendanceDate) {
        alert("Please select a date");
        return;
    }

    fetch("/save-attendance/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            student_name: studentName,
            academic_year: academicYear,
            class_grade: grade,
            date: attendanceDate,
            status: status
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log(data);
        alert(studentName + " marked as " + status);
    })
    .catch(error => {
        console.error(error);
        alert("Error saving attendance");
    });
}
function openSidebar() {
    document.getElementById("mobileSidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar() {
    document.getElementById("mobileSidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
