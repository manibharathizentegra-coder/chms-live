<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Attendance</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:20px;
        }

        .container{
            background:white;
            padding:20px;
            border-radius:10px;
            max-width:1200px;
            margin:auto;
        }

        h2{
            margin-bottom:20px;
        }

        .filters{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        select,
        input[type=date]{

            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#2c3e50;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        .present{

            background:green;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:5px;
        }

        .absent{

            background:red;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:5px;
        }

@media screen and (max-width:768px){

    .filters{
        flex-direction:column;
    }

    select,
    input,
    button{
        width:100%;
    }

    table{
        font-size:14px;
    }

    th,td{
        padding:8px;
    }
}

    </style>

</head>

<body>
    

<div class="container">

    <h2>Student Attendance</h2>

    <form method="GET">

        <div class="filters">

            <input
                type="date"
                name="attendance_date">

            <select name="grade">

                <option value="">
                    Select Grade
                </option>

                {% for grade in grades %}

                <option
                    value="{{ grade }}"
                    {% if grade == selected_grade %}
                    selected
                    {% endif %}
                >

                    {{ grade }}

                </option>

                {% endfor %}

            </select>

            <button type="submit">
                Load Students
            </button>

        </div>

    </form>

    <table>

        <thead>

            <tr>

                <th>Student Name</th>

                <th>Grade</th>

                <th>Attendance</th>

            </tr>

        </thead>

        <tbody>

        {% for student in students %}

            <tr>

                <td>
                    {{ student.Student_Name }}
                </td>

                <td>
                    {{ student.Class_Grade }}
                </td>

                <td>

                    <button class="present">
                        Present
                    </button>

                    <button class="absent">
                        Absent
                    </button>

                </td>

            </tr>

        {% empty %}

            <tr>

                <td colspan="3">
                    No Students Found
                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
