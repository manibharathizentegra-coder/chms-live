<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            background: #ffffff;
        }

        /* ============ LEFT PANEL ============ */
        .left-panel {
            flex: 1.1;
            background: #f0f4ff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .bg-shape-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(74,107,197,0.08) 0%, transparent 70%);
            border-radius: 50%;
            top: -150px;
            left: -150px;
            z-index: 0;
        }

        .bg-shape-2 {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,107,107,0.06) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -100px;
            right: -80px;
            z-index: 0;
        }

        .bg-shape-3 {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(46,204,113,0.05) 0%, transparent 70%);
            border-radius: 50%;
            top: 30%;
            right: 10%;
            z-index: 0;
        }

        .illustration-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .illustration-wrapper svg {
            width: 100%;
            height: auto;
            max-height: 520px;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.08));
        }

        /* ============ RIGHT PANEL ============ */
        .right-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.8s ease;
        }

        .login-card h2 {
            font-size: 36px;
            color: #1e2a4a;
            margin-bottom: 6px;
            font-weight: 800;
        }

        .login-card .subtitle {
            color: #8d99ae;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .login-card .subtitle a {
            color: #4a6bc5;
            text-decoration: none;
            font-weight: 700;
        }

        .login-card .subtitle a:hover {
            text-decoration: underline;
        }

        /* Error Message */
        .error-box {
            background: #fff5f5;
            border-left: 4px solid #ff6b6b;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 25px;
            color: #d63031;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease;
        }

        .error-box i {
            font-size: 18px;
            color: #ff6b6b;
        }

        /* Input Group */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e2a4a;
            margin-bottom: 8px;
        }

        .input-group i.field-icon {
            position: absolute;
            right: 16px;
            top: 44px;
            color: #a0aec0;
            font-size: 18px;
            transition: color 0.3s;
        }

        .input-group input[type="email"] {
            width: 100%;
            padding: 15px 48px 15px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            background: #f8fafc;
            transition: all 0.3s ease;
            color: #1e2a4a;
        }

        .input-group input[type="email"]::placeholder {
            color: #b0bec5;
        }

        .input-group input[type="email"]:focus {
            border-color: #4a6bc5;
            background: white;
            box-shadow: 0 0 0 4px rgba(74, 107, 197, 0.1);
        }

        .input-group:focus-within i.field-icon {
            color: #4a6bc5;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4a6bc5 0%, #3a5199 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(74, 107, 197, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(74, 107, 197, 0.5);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .btn-submit i {
            font-size: 15px;
            transition: transform 0.3s;
        }

        .btn-submit:hover i {
            transform: translateX(4px);
        }

        /* Footer */
        .form-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 13px;
            color: #8d99ae;
        }

        .form-footer i {
            color: #4a6bc5;
            margin-right: 4px;
        }

        /* ============ ANIMATIONS ============ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .pulsing {
            animation: pulse 2.5s ease-in-out infinite;
        }

        /* ============ RESPONSIVE: TABLET ============ */
        @media screen and (max-width: 1024px) {
            body {
                flex-direction: column;
                /* NO centering - content starts from top */
                align-items: stretch;
                justify-content: flex-start;
            }

            .left-panel {
                flex: none;
                min-height: auto;
                padding: 20px;
            }

            .illustration-wrapper {
                max-width: 400px;
            }

            .right-panel {
                padding: 30px 20px;
                align-items: flex-start;
            }

            .login-card h2 {
                font-size: 28px;
            }
        }

        /* ============ RESPONSIVE: MOBILE ============ */
        @media screen and (max-width: 580px) {
            body {
                flex-direction: column;
                align-items: stretch;
                justify-content: flex-start;
                /* No extra space at top */
                min-height: auto;
            }

            /* Left panel: compact on mobile */
            .left-panel {
                min-height: auto;
                padding: 10px 10px;
            }

            .illustration-wrapper {
                max-width: 220px;
            }

            /* Hide decorative shapes on mobile to save space */
            .bg-shape-1,
            .bg-shape-2,
            .bg-shape-3 {
                display: none;
            }

            /* Right panel: tight padding */
            .right-panel {
                padding: 15px 20px;
                align-items: flex-start;
            }

            .login-card {
                max-width: 100%;
            }

            .login-card h2 {
                font-size: 24px;
                margin-bottom: 4px;
            }

            .login-card .subtitle {
                margin-bottom: 20px;
                font-size: 13px;
            }

            .input-group {
                margin-bottom: 15px;
            }

            .input-group label {
                margin-bottom: 6px;
            }

            .input-group input[type="email"] {
                padding: 13px 48px 13px 16px;
            }

            .btn-submit {
                padding: 14px;
            }

            .form-footer {
                margin-top: 15px;
            }
        }

        /* ============ RESPONSIVE: VERY SMALL MOBILE ============ */
        @media screen and (max-width: 400px) {
            .left-panel {
                padding: 8px;
            }

            .illustration-wrapper {
                max-width: 180px;
            }

            .right-panel {
                padding: 12px 15px;
            }

            .login-card h2 {
                font-size: 22px;
            }
        }
    </style>
</head>

                    <circle cx="22" cy="5" r="1.5" fill="#2c3e50" opacity="0.3"/>
                    <circle cx="39" cy="22" r="1.5" fill="#2c3e50" opacity="0.3"/>
                    <circle cx="22" cy="39" r="1.5" fill="#2c3e50" opacity="0.3"/>
                    <circle cx="5" cy="22" r="1.5" fill="#2c3e50" opacity="0.3"/>
                </g>

                <!-- ===== GLOBE ===== -->
                <g transform="translate(480, 330)">
                    <circle cx="18" cy="18" r="16" fill="#3498db"/>
                    <ellipse cx="18" cy="18" rx="16" ry="8" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>
                    <ellipse cx="18" cy="18" rx="8" ry="16" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.4"/>
                    <ellipse cx="14" cy="12" rx="6" ry="5" fill="#2ecc71" opacity="0.7"/>
                    <ellipse cx="22" cy="22" rx="4" ry="3" fill="#2ecc71" opacity="0.6"/>
                    <line x1="18" y1="34" x2="18" y2="42" stroke="#7f8c8d" stroke-width="2"/>
                    <ellipse cx="18" cy="44" rx="10" ry="3" fill="#7f8c8d"/>
                </g>

            </svg>
        </div>
    </div>

    <!-- ============ RIGHT PANEL ============ -->
    <div class="right-panel">
        <div class="login-card">

            <h2>Login</h2>
            <p class="subtitle">Don't have an account? <a href="#">Create your account</a></p>

            {% if error %}
            <div class="error-box">
                <i class="fas fa-exclamation-triangle"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >
                    <i class="fas fa-envelope field-icon"></i>
                </div>

                <button type="submit" class="btn-submit">
                    Send OTP <i class="fas fa-arrow-right"></i>
                </button>

            </form>

            <p class="form-footer">
                <i class="fas fa-lock"></i> Secured with SSL Encryption
            </p>

        </div>
    </div>

</body>
</html>
